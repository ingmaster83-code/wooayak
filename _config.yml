title: 이약뭐야? - 의약품 정보 검색
description: >-
  이 약 뭐야? 일반의약품 효능, 용법, 부작용, 주의사항을 한눈에 확인하세요.
  식약처 공공데이터 기반 신뢰할 수 있는 의약품 정보 사이트.
url: "https://wooayak.wooahouse.com"
baseurl: ""
lang: ko
timezone: Asia/Seoul
author: WooaHouse

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

# 약 상세 페이지는 _plugins/drug_generator.rb가 생성하므로 _data 제외
exclude:
  - Gemfile
  - Gemfile.lock
  - scripts/
  - "*.py"
  - "*.bat"
  - README.md
  - .gitignore
  - vendor/
